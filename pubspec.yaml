name: yo_te_llevo
description: "Yo Te Llevo - Carpooling de rutas fijas"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_analytics: ^11.4.4

  # Maps
  mapbox_maps_flutter: ^2.7.1

  # Networking
  dio: ^5.8.0

  # Local Storage
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.8.1

  # Auth Providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Geolocation
  geolocator: ^13.0.2
  dart_geohash: ^2.0.3

  # Utils
  dartz: ^0.10.1
  connectivity_plus: ^6.1.4
  flutter_local_notifications: ^18.0.1
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5

flutter:
  uses-material-design: true

  assets:
    - .env
